name: CI

on:
  push:
    branches: [ main, feat/customizer-autoreload ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    # Opt into Node.js 24 for JS actions to avoid Node.js 20 deprecation warnings
    env:
      FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

    strategy:
      matrix:
        # Quote versions so YAML doesn't parse them as floats (3.10 -> 3.1)
        python-version: ['3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v4

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v4
      with:
        python-version: ${{ matrix.python-version }}

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        pip install paramiko

    - name: Run unit tests
      run: |
        python -m unittest discover -v

    - name: Run a quick lint (optional)
      run: |
        python -m pip install flake8
        flake8 --max-line-length=120 || true
