name: CI

on:
  push:
    branches: [ main ]
  # No branch filter: this previously ran only on pull requests targeting main,
  # so a stacked pull request (one whose base is another feature branch) never
  # ran the test suite at all. Every constitution-* workflow already triggers on
  # bare `pull_request:` for this reason.
  pull_request:

jobs:
  build:
    runs-on: ubuntu-latest

    strategy:
      fail-fast: false
      matrix:
        # Every version pyproject.toml's requires-python (">=3.8") claims to
        # support must actually run the suite here. Previously this matrix was
        # 3.11/3.12 only, while pylint.yml linted 3.8/3.9/3.10 — because both
        # workflows name their job "build", the PR check list showed
        # "build (3.8)".."build (3.12)" and looked like full coverage when 3.8
        # was never test-verified at all.
        python-version: ['3.8', '3.9', '3.10', '3.11', '3.12']

    steps:
    - uses: actions/checkout@v6

    - name: Show runner info
      run: |
        uname -a
        lsb_release -a || true
        echo "Python versions available:"
        pyenv versions || true

    - name: Set up Python ${{ matrix.python-version }}
      uses: actions/setup-python@v6
      with:
        python-version: ${{ matrix.python-version }}

    - name: Show Python and pip
      run: |
        python --version
        which python || true
        python -m pip --version
        python -m pip list

    - name: Install dependencies
      run: |
        python -m pip install --upgrade pip
        # Install from the manifest rather than naming packages inline, so CI
        # exercises the same dependency resolution a user gets. On Python 3.8
        # this resolves paramiko 3.x (4.x requires >=3.9); on 3.9+ it resolves
        # 4.x. See docs/OTS_SOFTWARE.md.
        pip install -e .
        python -c "import paramiko; print('paramiko', paramiko.__version__)"

    - name: Run unit tests (verbose)
      run: |
        python -m unittest test_SSH_DeviceManager test_customizer -v

    - name: Collect environment for debugging
      if: failure()
      run: |
        echo "=== ENV ==="
        env || true
        echo "=== Python info ==="
        python --version || true
        python -m pip --version || true
        python -m pip list || true

    - name: Run a quick lint (optional)
      run: |
        python -m pip install flake8
        flake8 --max-line-length=120 || true
