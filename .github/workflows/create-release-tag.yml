# .github/workflows/2-create-release.yml
#
# PURPOSE:
#   This workflow creates the actual GitHub release and Git tag.
#
# WHEN TO RUN:
#   Run this manually after merging a PR.
#
# HOW TO RUN:
#   GitHub repo -> Actions -> 2 - Create Release -> Run workflow
#
# WHAT TO ENTER:
#   bump_type:
#     major = breaking change
#     minor = new feature
#     patch = bug fix / small update
#
# EXAMPLE:
#   Current version: v1.4.2
#   bump_type: minor
#   New release: v1.5.0

name: 2 - Create Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "What type of release should this be?"
        required: true
        type: choice
        options:
          - major
          - minor
          - patch

      release_notes:
        description: "Short release notes, usually the merged PR title or summary."
        required: true
        type: string

permissions:
  contents: write

jobs:
  create-release:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub release and tag
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;

            const bumpType = "${{ inputs.bump_type }}";
            const releaseNotes = `${{ inputs.release_notes }}`;

            // ------------------------------------------------------------
            // STEP 1: Find the latest GitHub release.
            // Example: v1.4.2
            // If no release exists yet, start from v0.0.0.
            // ------------------------------------------------------------
            let currentVersion = "v0.0.0";

            try {
              const latestRelease = await github.rest.repos.getLatestRelease({
                owner,
                repo
              });

              currentVersion = latestRelease.data.tag_name;
            } catch (error) {
              core.notice("No existing release found. Starting from v0.0.0.");
            }

            // ------------------------------------------------------------
            // STEP 2: Calculate the next version.
            // ------------------------------------------------------------
            function bumpVersion(version, bump) {
              const cleanVersion = version.replace(/^v/, "");
              const [major, minor, patch] = cleanVersion
                .split(".")
                .map(Number);

              if (bump === "major") {
                return `v${major + 1}.0.0`;
              }

              if (bump === "minor") {
                return `v${major}.${minor + 1}.0`;
              }

              return `v${major}.${minor}.${patch + 1}`;
            }

            const nextVersion = bumpVersion(currentVersion, bumpType);

            // ------------------------------------------------------------
            // STEP 3: Create the GitHub release.
            //
            // GitHub automatically creates the Git tag if it does not
            // already exist.
            // ------------------------------------------------------------
            await github.rest.repos.createRelease({
              owner,
              repo,
              tag_name: nextVersion,
              name: nextVersion,
              body: releaseNotes,
              draft: false,
              prerelease: false
            });

            core.notice(`Created release ${nextVersion}`);
