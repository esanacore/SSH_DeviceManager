# .github/workflows/1-suggest-release-version.yml
#
# PURPOSE:
#   This workflow reviews a pull request and comments with a suggested release bump.
#
# WHAT IT DOES:
#   - Finds the latest GitHub release, such as v1.4.2
#   - Looks at the PR commit messages
#   - Suggests major, minor, patch, or none
#   - Comments on the PR with the suggested next version
#
# IMPORTANT:
#   This workflow does NOT create a release.
#   It only suggests what the next release should be.

name: 1 - Suggest Release Version

on:
  pull_request:
    types: [opened, synchronize, reopened, edited]

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  suggest-release-version:
    runs-on: ubuntu-latest

    steps:
      - name: Suggest release version
        uses: actions/github-script@v8
        with:
          script: |
            const { owner, repo } = context.repo;
            const pr = context.payload.pull_request;

            // ------------------------------------------------------------
            // STEP 1: Get the latest GitHub release.
            // Example: v1.4.2
            // If no release exists yet, start from v0.0.0.
            // ------------------------------------------------------------
            let currentVersion = "v0.0.0";

            try {
              const latestRelease = await github.rest.repos.getLatestRelease({
                owner,
                repo
              });

              currentVersion = latestRelease.data.tag_name;
            } catch (error) {
              core.notice("No existing release found. Starting from v0.0.0.");
            }

            // ------------------------------------------------------------
            // STEP 2: Read commit messages from the pull request.
            //
            // This works best if commits follow a simple convention:
            //   feat: add new feature        -> minor
            //   fix: correct a bug           -> patch
            //   feat!: breaking change       -> major
            //   BREAKING CHANGE              -> major
            // ------------------------------------------------------------
            const commits = await github.paginate(
              github.rest.pulls.listCommits,
              {
                owner,
                repo,
                pull_number: pr.number,
                per_page: 100
              }
            );

            const commitMessages = commits
              .map(commit => commit.commit.message)
              .join("\n");

            // ------------------------------------------------------------
            // STEP 3: Suggest the bump type.
            //
            // major = breaking change
            // minor = new feature
            // patch = bug fix / small change
            // ------------------------------------------------------------
            let suggestedBump = "patch";

            if (
              commitMessages.includes("BREAKING CHANGE") ||
              commitMessages.match(/^[a-zA-Z]+(\(.+\))?!:/m)
            ) {
              suggestedBump = "major";
            } else if (
              commitMessages.match(/^feat(\(.+\))?:/m) ||
              commitMessages.toLowerCase().includes("feature")
            ) {
              suggestedBump = "minor";
            }

            // ------------------------------------------------------------
            // STEP 4: Calculate the next version number.
            // ------------------------------------------------------------
            function bumpVersion(version, bump) {
              const cleanVersion = version.replace(/^v/, "");
              const [major, minor, patch] = cleanVersion
                .split(".")
                .map(Number);

              if (bump === "major") {
                return `v${major + 1}.0.0`;
              }

              if (bump === "minor") {
                return `v${major}.${minor + 1}.0`;
              }

              return `v${major}.${minor}.${patch + 1}`;
            }

            const suggestedVersion = bumpVersion(currentVersion, suggestedBump);

            // ------------------------------------------------------------
            // STEP 5: Comment on the PR.
            //
            // This is the workflow "asking" you what to do.
            // You answer by adding one of these labels:
            //
            //   release:major
            //   release:minor
            //   release:patch
            //   release:none
            // ------------------------------------------------------------
            const body = [
              "## Release Version Suggestion",
              "",
              `Current release: \`${currentVersion}\``,
              `Suggested bump: \`${suggestedBump}\``,
              `Suggested next release: \`${suggestedVersion}\``,
              "",
              "Before merging, choose the final release decision by adding one label:",
              "",
              "- `release:major` for breaking changes",
              "- `release:minor` for new features",
              "- `release:patch` for bug fixes or small updates",
              "- `release:none` if this PR should not create a release",
              "",
              "After the PR is merged, manually run the `2 - Create Release` workflow from the Actions tab."
            ].join("\n");

            await github.rest.issues.createComment({
              owner,
              repo,
              issue_number: pr.number,
              body
            });
